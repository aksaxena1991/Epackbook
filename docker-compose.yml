services:
  postgres:
    build: .
    image: epackbook-postgres:16
    container_name: epackbook_postgres
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "${POSTGRES_CPUS}"
          memory: "${POSTGRES_MEMORY}"

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: epackbook_pgadmin
    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "5050:80"

    depends_on:
      postgres:
        condition: service_healthy

    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data: