services:
  # ─── Database ────────────────────────────────────────────────────────────────
  postgres:
    build: .
    image: epackbook-postgres:16
    container_name: epackbook_postgres
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "${POSTGRES_CPUS}"
          memory: "${POSTGRES_MEMORY}"

  # ─── FastAPI App Instances (load-balanced by nginx) ──────────────────────────
  api_1:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: epackbook-api:latest
    container_name: epackbook_api_1
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DB_HOST=postgres        # use the service name, not localhost
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health/db')\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  api_2:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: epackbook-api:latest
    container_name: epackbook_api_2
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DB_HOST=postgres
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health/db')\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  api_3:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: epackbook-api:latest
    container_name: epackbook_api_3
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DB_HOST=postgres
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health/db')\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─── Nginx Load Balancer ──────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: epackbook_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api_1:
        condition: service_healthy
      api_2:
        condition: service_healthy
      api_3:
        condition: service_healthy

  # ─── pgAdmin ─────────────────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: epackbook_pgadmin
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data: