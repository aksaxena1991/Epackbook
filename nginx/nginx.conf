upstream epackbook_api {
    least_conn;          # route each new connection to the least-loaded instance
    server api_1:8000;
    server api_2:8000;
    server api_3:8000;
}

server {
    listen 80;
    server_name _;

    # Pass all traffic to the upstream pool
    location / {
        proxy_pass         http://epackbook_api;
        proxy_http_version 1.1;

        # Standard proxy headers
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout  10s;
        proxy_send_timeout     90s;
        proxy_read_timeout     90s;

        # Buffer settings
        proxy_buffering    on;
        proxy_buffer_size  4k;
        proxy_buffers      8 16k;
    }

    # Standalone health-check endpoint (nginx itself responds fast)
    location /nginx-health {
        access_log off;
        return 200 "nginx ok\n";
        add_header Content-Type text/plain;
    }
}
