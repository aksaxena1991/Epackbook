apiVersion: apps/v1
kind: Deployment
metadata:
  name: epackbook-api
  namespace: epackbook
spec:
  replicas: 1
  selector:
    matchLabels:
      app: epackbook-api
  template:
    metadata:
      labels:
        app: epackbook-api
    spec:
      containers:
        - name: api
          image: epackbook-api:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: epackbook-secret
          readinessProbe:
            httpGet:
              path: /health/db
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: epackbook-api
  namespace: epackbook
spec:
  type: NodePort
  selector:
    app: epackbook-api
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30080
